<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <h1>Rock-Paper-Scissors!</h1>

    <div class="biggerContainer">
            <div id="container">
                
                <div class="smallerContainer">
                    <div class="choice2 hoverObject playerChoice">
                        <img src="rock.png" alt="RockImage">
                        <legend>Rock</legend>
                    </div>
                    <div class="choice2 hoverObject playerChoice">
                        <img src="scissors.png" alt="RockImage">
                        <legend>Scissors</legend>
                    </div>
                </div>
                <div class="smallerContainer2">
                    <div class="pic"><h2>Your Pick</h2></div>
                    <div class="choice2 hoverObject playerChoice">
                        <img src="paper.png" alt="RockImage">
                        <legend>Paper</legend>
                    </div>
                </div>
                
            </div>

            <img src="vs.png" alt="VS Image" id="vs">

            <div id="container">
                <div class="smallerContainer2">
                    <div class="pic"><h2>AI's Pick</h2></div>
                    <div class="choice2 aiChoice">
                        <img src="paper.png" alt="RockImage">
                        <legend>Paper</legend>
                    </div>
                </div>
                <div class="smallerContainer">
                    <div class="choice2 AiPic">
                        <img src="rock.png" alt="RockImage">
                        <legend>Rock</legend>
                    </div>
                    <div class="choice2 AiPic">
                        <img src="scissors.png" alt="RockImage">
                        <legend>Scissors</legend>
                    </div>
                </div>
            </div>
    </div>

    <button id="reset">
        <i class="fa-solid fa-arrow-rotate-left"></i>
         Reset Game
    </button>



    <script src="app.js"></script>
</body>
</html>
